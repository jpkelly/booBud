name: booBud
options:
  bundleIdPrefix: com.boobud
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  booBud:
    type: application
    platform: iOS
    sources:
      - path: booBud
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.boobud.app
        MARKETING_VERSION: "1.4"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: booBud/Resources/Info.plist
        DEVELOPMENT_TEAM: 4QRU3PRZC6
        CODE_SIGN_STYLE: Automatic
    preBuildScripts:
      - name: "SwiftLint"
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          fi
        basedOnDependencyAnalysis: false
        inputFiles: []
        outputFiles: []

schemes:
  booBud:
    build:
      targets:
        booBud: all
      preActions:
        - name: "Bump Build Number"
          script: |
            ${SRCROOT}/scripts/bump-build-number.sh
          settingsTarget: booBud
