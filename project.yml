name: booBud
options:
  bundleIdPrefix: com.boobud
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  booBud:
    type: application
    platform: iOS
    sources:
      - path: beanBud
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.boobud.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: beanBud/Resources/Info.plist
    preBuildScripts:
      - name: "SwiftLint"
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          fi
        basedOnDependencyAnalysis: false
        inputFiles: []
        outputFiles: []
