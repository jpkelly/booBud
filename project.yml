name: beanBud
options:
  bundleIdPrefix: com.beanbud
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  beanBud:
    type: application
    platform: iOS
    sources:
      - path: beanBud
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beanbud.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "BeanBud needs Bluetooth to connect to your Bookoo coffee scale for real-time weight measurement."
        INFOPLIST_KEY_UIBackgroundModes: "bluetooth-central"
    preBuildScripts:
      - name: "SwiftLint"
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          fi
        basedOnDependencyAnalysis: false
        inputFiles: []
        outputFiles: []
